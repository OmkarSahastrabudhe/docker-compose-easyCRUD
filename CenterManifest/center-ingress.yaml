apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: center-ingress
  labels:
    app: studentapp
spec:
  ingressClassName: nginx 
  rules:
  - host: a3ded41e072684c0b813539e0c523cc2-1686142993.ap-south-1.elb.amazonaws.com   
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: studentapp-frontend-svc
            port: 
              number: 80
      - pathType: Prefix
        path: "/api"
        backend:
          service:
            name: studentapp-backend-svc
            port:
              number: 8080
               
