apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: center-ingress
  labels:
    app: studentapp
spec:
  ingressClassName: nginx 
  rules:
  - host: a0a7a8a726e1445d0bb54137a8c250f9-1474431958.ap-south-1.elb.amazonaws.com  
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: studentapp-frontend-svc
            port: 
              number: 80
      - pathType: Prefix
        path: "/api"
        backend:
          service:
            name: studentapp-backend-svc
            port:
              number: 8080
               
