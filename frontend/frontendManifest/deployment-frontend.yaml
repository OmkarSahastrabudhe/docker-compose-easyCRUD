apiVersion: apps/v1
kind: Deployment
metadata:
  name: studentapp-frontend-deployment
  labels:
    app: studentapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: studentapp-frontend
  template:
    metadata:
      labels:
        app: studentapp-frontend
    spec:
      containers:
        - name: my-frontend
          image: omkarsahastrabudhe/fronntendfinal:v1 
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
