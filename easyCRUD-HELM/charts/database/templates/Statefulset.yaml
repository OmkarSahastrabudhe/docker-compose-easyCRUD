{{- if .Values.components.statefulset.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ printf "%s-%s" .Release.Name .Values.components.statefulset.name }}
  labels:
     {{- toYaml .Values.global.labels | nindent  4 }}
       
spec:
  selector:
    matchLabels:
      app: studentapp-db
  serviceName: {{ printf "%s-%s" .Release.Name .Values.components.service.name }}
  replicas: {{ .Values.components.statefulset.replicasCount}}
  template:
    metadata:
      labels:
        app: studentapp-db
    spec:
      containers:
        - name: mydb
          image: mariadb
          resources:
            {{- toYaml .Values.global.containerResources | nindent 12 }}
          ports:
            - containerPort: {{ .Values.components.statefulset.containerPort }}
          env: 
            - name: "MARIADB_ROOT_PASSWORD"
              value: "omkar123"
            - name: "MARIADB_DATABASE"
              value: "studentapp" 

{{- end }}            
            